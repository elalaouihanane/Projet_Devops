name: CI - Tests Trendora

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test-laravel:
    name: Tests Laravel
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: trendora
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql , gd, fileinfo
          coverage: none

      - name: Installer les dépendances Composer
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Configurer l'environnement
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Créer le dossier storage
        working-directory: ./backend
        run: |
          mkdir -p storage/app/public/profiles
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R 777 storage

      - name: Créer le lien symbolique storage
        working-directory: ./backend
        run: php artisan storage:link    

      - name: Migrer la base de données
        working-directory: ./backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: trendora
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Lancer les tests
        working-directory: ./backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: trendora
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --parallel